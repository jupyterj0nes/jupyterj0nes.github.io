---
layout: default
---
<div class="container container-narrow">
  <header class="page-header">
    <h1 class="page-title"><span class="prompt">#</span> {{ page.title }}</h1>
    {% if page.description %}
    <p class="page-description">{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="page-content">
    {{ content }}
  </div>
</div>
