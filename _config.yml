# Site settings
title: "We Investigate Anything"
tagline: "Digital Forensics & Incident Response"
description: "DFIR knowledge base — artifacts, tools, cases, and more. Base de conocimiento forense digital."
url: "https://weinvestigateanything.com"
baseurl: ""

# Author
author:
  name: "jupyterj0nes"
  github: "jupyterj0nes"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# Languages
languages: ["es", "en"]
default_lang: "es"

# Collections
collections:
  pages_es:
    output: true
    permalink: /es/:title/
  pages_en:
    output: true
    permalink: /en/:title/

# Defaults
defaults:
  - scope:
      path: "_posts/es"
      type: "posts"
    values:
      layout: "post"
      lang: "es"
      comments: true
      permalink: /es/:categories/:title/
  - scope:
      path: "_posts/en"
      type: "posts"
    values:
      layout: "post"
      lang: "en"
      comments: true
      permalink: /en/:categories/:title/
  - scope:
      path: "pages/en"
    values:
      layout: "page"
      lang: "en"
  - scope:
      path: "pages/es"
    values:
      layout: "page"
      lang: "es"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Giscus comments
giscus:
  repo: "jupyterj0nes/jupyterj0nes.github.io"
  repo_id: ""
  category: "General"
  category_id: ""
  mapping: "pathname"
  reactions_enabled: "1"
  theme: "dark"

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
