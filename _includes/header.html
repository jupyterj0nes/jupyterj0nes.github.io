{% assign lang = page.lang | default: "es" %}
{% assign t = site.data.translations[lang] %}

<header class="site-header">
  <div class="header-inner">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      <span class="logo-bracket">[</span>
      <span class="logo-text">WIA</span>
      <span class="logo-bracket">]</span>
      <span class="logo-cursor">_</span>
    </a>
    <nav class="site-nav">
      <button class="nav-toggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="{{ '/' | append: lang | append: '/artifacts/' | relative_url }}">{{ t.nav.artifacts }}</a></li>
        <li><a href="{{ '/' | append: lang | append: '/tools/' | relative_url }}">{{ t.nav.tools }}</a></li>
        <li><a href="{{ '/' | append: lang | append: '/cases/' | relative_url }}">{{ t.nav.cases }}</a></li>
        <li><a href="{{ '/' | append: lang | append: '/leon/' | relative_url }}">{{ t.nav.leon }}</a></li>
        <li><a href="{{ '/' | append: lang | append: '/about/' | relative_url }}">{{ t.nav.about }}</a></li>
        <li class="lang-switch">
          {% if lang == "es" %}
            <a href="/en/" title="Switch to English">EN</a>
          {% else %}
            <a href="/" title="Cambiar a español">ES</a>
          {% endif %}
        </li>
      </ul>
    </nav>
  </div>
</header>
